<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réalisations professionnelles | Damien Zanatta</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .projects-tab-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .pdf-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      margin-bottom: 18px;
    }

    .pdf-button {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      color: #00141a;
      background: linear-gradient(135deg, #14dfff, #49efff);
      box-shadow: 0 0 18px rgba(32, 227, 255, 0.24);
    }

    .pdf-frame {
      width: 100%;
      height: 900px;
      border: 1px solid rgba(32, 227, 255, 0.22);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.98);
    }

    @media (max-width: 900px) {
      .projects-tab-grid {
        grid-template-columns: 1fr;
      }

      .pdf-frame {
        height: 700px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <div class="site-title">Damien Zanatta</div>

      <nav class="nav-links" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="about.html">Présentation</a>
        <a href="projects.html" class="active">Réalisations professionnelles</a>
        <a href="monitoring.html">Veille informatique</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="page-box presentation-box">
        <h1>Réalisations professionnelles</h1>

        <div class="tab-grid projects-tab-grid" role="tablist" aria-label="Contenu des réalisations professionnelles">
          <button class="tab-card" id="tab-training" role="tab" aria-selected="false" aria-controls="panel-training" data-tab="training">
            En formation
          </button>

          <button class="tab-card" id="tab-company" role="tab" aria-selected="false" aria-controls="panel-company" data-tab="company">
            En entreprise
          </button>

          <button class="tab-card" id="tab-summary" role="tab" aria-selected="false" aria-controls="panel-summary" data-tab="summary">
            Tableau de synthèse
          </button>
        </div>

        <div class="tab-panels">
          <section class="tab-panel" id="panel-training" role="tabpanel" aria-labelledby="tab-training">
          </section>

          <section class="tab-panel" id="panel-company" role="tabpanel" aria-labelledby="tab-company">
          </section>

          <section class="tab-panel" id="panel-summary" role="tabpanel" aria-labelledby="tab-summary">
            <div class="timeline">
              <div class="timeline-content">
                <h3>Tableau de synthèse</h3>
                <p>
                  Ce document regroupe l’ensemble des réalisations professionnelles présentées dans le cadre de l’épreuve E5.
                </p>

                <div class="pdf-actions">
                  <a class="pdf-button" href="tableau-synthese-bts-sio-2026.pdf" target="_blank">
                    Ouvrir le PDF
                  </a>
                </div>

                <iframe
                  class="pdf-frame"
                  src="tableau-synthese-bts-sio-2026.pdf#view=FitH"
                  title="Tableau de synthèse BTS SIO">
                </iframe>
              </div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Damien Zanatta - Portfolio</p>
    </div>
  </footer>

  <script>
    const tabButtons = document.querySelectorAll(".tab-card");
    const tabPanels = document.querySelectorAll(".tab-panel");

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const target = button.dataset.tab;
        const targetPanel = document.getElementById("panel-" + target);
        const isAlreadyActive = button.classList.contains("active");

        tabButtons.forEach((btn) => {
          btn.classList.remove("active");
          btn.setAttribute("aria-selected", "false");
        });

        tabPanels.forEach((panel) => {
          panel.classList.remove("active");
        });

        if (!isAlreadyActive && targetPanel) {
          button.classList.add("active");
          button.setAttribute("aria-selected", "true");
          targetPanel.classList.add("active");
        }
      });
    });
  </script>
</body>
</html>
