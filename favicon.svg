<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="orb-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0ffff"/>
      <stop offset="34%" stop-color="#e0ffff"/>
      <stop offset="35%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </radialGradient>

    <filter id="orb-glow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Halo externe équivalent au box-shadow diffus -->
  <circle cx="32" cy="32" r="20" fill="#00ffff" opacity="0.18" filter="url(#orb-glow)"/>

  <!-- Anneau doux équivalent au 0 0 0 4px rgba(0, 255, 255, 0.1) -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="rgba(0, 255, 255, 0.1)" stroke-width="8"/>

  <!-- Sphère centrale -->
  <circle cx="32" cy="32" r="12" fill="url(#orb-core)"/>
</svg>
